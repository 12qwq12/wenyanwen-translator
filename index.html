<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 初中文言文字词背诵助手</title>
    <style>
        :root {
            --bg: #fdf8f0;
            --card-bg: #fffef9;
            --primary: #8b5e3c;
            --primary-light: #a0724a;
            --accent: #c0392b;
            --success: #4a8c5c;
            --danger: #c0392b;
            --text: #3e2f1c;
            --text-light: #6b5d4a;
            --border: #e0d5c1;
            --shadow: 0 2px 12px rgba(62, 47, 28, 0.08);
            --radius: 14px;
            --radius-sm: 8px;
            --font-serif: 'STSong', 'Songti SC', 'Noto Serif SC', 'SimSun', 'KaiTi', serif;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: linear-gradient(160deg, #fdf6ec 0%, #f9f0e2 30%, #fdf8f0 60%, #faf3e8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }
        .app-container { width: 100%; max-width: 600px; }
        .app-header { text-align: center; margin-bottom: 16px; }
        .app-header h1 {
            font-family: var(--font-serif);
            font-size: 26px;
            font-weight: 700;
            color: var(--primary);
        }
        .app-header .subtitle { font-size: 13px; color: var(--text-light); }
        .tab-nav {
            display: flex;
            gap: 6px;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 5px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            background: transparent;
            color: var(--text-light);
            transition: 0.2s;
        }
        .tab-btn.active { background: var(--primary); color: #fff; }
        .page { display: none; }
        .page.active { display: block; }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .card-title {
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 14px;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            background: #fffefb;
            color: var(--text);
            resize: vertical;
        }
        textarea { min-height: 100px; }
        .input-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .input-row > div { flex: 1; min-width: 120px; }
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin: 4px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-outline { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
        .btn-danger { background: #fff; color: var(--danger); border: 1px solid var(--danger); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-full { width: 100%; }
        .word-list { list-style: none; max-height: 400px; overflow-y: auto; }
        .word-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid #f0e8d8;
        }
        .word-item .word-text {
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }
        .word-item .word-translation { flex: 1; font-size: 14px; }
        .test-word-display {
            text-align: center;
            padding: 30px;
            background: #fefcf7;
            border-radius: var(--radius);
            border: 2px dashed var(--border);
            margin-bottom: 16px;
        }
        .test-word-display .ancient-word {
            font-family: var(--font-serif);
            font-size: 52px;
            font-weight: 900;
            color: var(--accent);
        }
        .test-actions { display: flex; gap: 8px; justify-content: center; margin: 10px 0; }
        .hint-display {
            background: #fef9f0;
            border: 1px solid #e8d9b8;
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            text-align: center;
            color: #8b6914;
        }
        .feedback {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: 600;
        }
        .feedback.correct { background: #e6f4e6; color: #2d6a2d; }
        .feedback.wrong { background: #fde8e8; color: #a03030; }
        .feedback.answer-reveal {
            background: #fef5e7;
            color: #8b5e1a;
            border: 1px solid #f0c060;
        }
        .stats-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 12px;
        }
        .stat-item {
            background: #fffefb;
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .empty-state { text-align: center; padding: 40px; color: var(--text-light); }

        /* 日志面板 */
        .log-panel {
            background: #fffefb;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            margin-top: 16px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 13px;
            box-shadow: var(--shadow);
        }
        .log-panel .log-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #f5f0e5;
            color: var(--text-light);
            word-break: break-all;
        }
        .log-entry .time { color: #b5a48c; font-size: 11px; margin-right: 6px; }
        .log-entry.success { color: var(--success); }
        .log-entry.error { color: var(--danger); }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #3e2f1c;
            color: #fff;
            padding: 10px 22px;
            border-radius: 24px;
            font-weight: 600;
            z-index: 999;
            animation: toastIn 0.3s ease;
            pointer-events: none;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>📜 文言文字词背诵</h1>
            <p class="subtitle">初中古汉语 · 字词翻译练习</p>
        </header>

        <!-- 环境警告 -->
        <div id="envWarning" style="background:#fff3cd;border:2px solid #ffc107;color:#856404;padding:14px;border-radius:8px;margin-bottom:12px;display:none;">
            ⚠️ <strong>环境异常</strong>：浏览器可能禁止了本地存储，请关闭无痕模式或允许本站存储数据。
        </div>

        <nav class="tab-nav">
            <button class="tab-btn active" id="tabBtn1">📖 自习导入</button>
            <button class="tab-btn" id="tabBtn2">✍️ 随机测试</button>
        </nav>

        <!-- 页面1 -->
        <div class="page active" id="page1">
            <div class="card">
                <div class="card-title">➕ 添加字词</div>
                <div class="input-row">
                    <div><label>文言文字词</label><input type="text" id="wordInput" placeholder="例如：之"></div>
                    <div><label>翻译 / 释义</label><input type="text" id="transInput" placeholder="例如：的；用于主谓之间"></div>
                </div>
                <button class="btn btn-primary" id="addBtn">✅ 添加到词库</button>
                <button class="btn btn-outline btn-sm" id="cancelEditBtn" style="display:none">✕ 取消编辑</button>
                <input type="hidden" id="editingId" value="">
            </div>

            <div class="card">
                <div class="card-title">📥 批量导入</div>
                <label>每行一条，用 —— 或 ： 分隔</label>
                <textarea id="batchInput" placeholder="之——的；用于主谓之间&#10;而——表转折，却"></textarea>
                <button class="btn btn-primary btn-full" id="batchBtn">📥 批量导入</button>
            </div>

            <div class="card">
                <div class="card-title">
                    📚 我的词库 <span id="wordCount"></span>
                    <button class="btn btn-outline btn-sm" id="sampleBtn">📋 示例</button>
                    <button class="btn btn-outline btn-sm" id="exportBtn">📤 导出</button>
                    <button class="btn btn-danger btn-sm" id="clearBtn">🗑 清空</button>
                </div>
                <input type="text" id="searchInput" placeholder="🔍 搜索..." style="margin-bottom:10px">
                <ul class="word-list" id="wordList"></ul>
                <p class="empty-state" id="emptyHint">📭 词库为空，快来添加吧</p>
            </div>
        </div>

        <!-- 页面2 -->
        <div class="page" id="page2">
            <div id="emptyTestState" class="card empty-state">
                📭 词库中还没有数据，请先导入字词
                <br><button class="btn btn-primary" id="goImportBtn">📖 前往导入</button>
            </div>
            <div id="testContent">
                <div class="card">
                    <div class="test-word-display">
                        <span>请翻译以下古代汉语字词：</span>
                        <span class="ancient-word" id="ancientWord">—</span>
                    </div>
                    <input type="text" id="answerInput" placeholder="在此输入你的翻译..." style="text-align:center;margin-bottom:10px">
                    <div class="test-actions">
                        <button class="btn btn-primary btn-lg" id="submitBtn">✅ 提交翻译</button>
                        <button class="btn btn-outline" id="hintBtn">💡 提示</button>
                        <button class="btn btn-outline btn-sm" id="skipBtn">⏭ 跳过</button>
                    </div>
                    <div class="hint-display" id="hintDisplay"></div>
                    <div id="feedbackArea"></div>
                </div>
                <div class="stats-bar">
                    <span class="stat-item">📝 已测试：<span id="statTotal">0</span></span>
                    <span class="stat-item">✅ 正确：<span id="statCorrect">0</span></span>
                    <span class="stat-item">📊 正确率：<span id="statRate">-</span></span>
                    <span class="stat-item">🔄 当前题尝试：<span id="statAttempts">0</span>/3</span>
                </div>
            </div>
        </div>

        <!-- 日志面板 -->
        <div class="log-panel" id="logPanel">
            <div class="log-title">
                <span>📋 操作日志</span>
                <button class="btn btn-outline btn-sm" id="clearLogBtn">清除</button>
            </div>
            <div id="logEntries"></div>
        </div>
    </div>
    <div id="toastContainer"></div>

    <script>
        (function() {
            // ========== 日志系统 ==========
            const logEntries = document.getElementById('logEntries');
            let logLines = [];

            function addLog(message, type) {
                type = type || 'info';
                const now = new Date();
                const time = now.toLocaleTimeString('zh-CN', { hour12: false });
                const entry = { time, message, type };
                logLines.push(entry);
                if (logLines.length > 50) logLines.shift();
                renderLog();
                // 同时输出到控制台
                console.log(`[${type.toUpperCase()}] ${time} ${message}`);
            }

            function renderLog() {
                if (!logEntries) return;
                logEntries.innerHTML = logLines.map(e => {
                    let cls = 'log-entry';
                    if (e.type === 'success') cls += ' success';
                    else if (e.type === 'error') cls += ' error';
                    return `<div class="${cls}"><span class="time">${e.time}</span> ${e.message}</div>`;
                }).join('');
                // 自动滚动到底部
                const panel = document.getElementById('logPanel');
                if (panel) panel.scrollTop = panel.scrollHeight;
            }

            // 清除日志
            document.getElementById('clearLogBtn').addEventListener('click', function() {
                logLines = [];
                renderLog();
                addLog('日志已清除', 'info');
            });

            // ========== 环境检测 ==========
            const envWarning = document.getElementById('envWarning');
            let storageAvailable = false;

            function testStorage() {
                try {
                    const testKey = '__storage_test__';
                    localStorage.setItem(testKey, '1');
                    localStorage.removeItem(testKey);
                    storageAvailable = true;
                    envWarning.style.display = 'none';
                    addLog('✅ 本地存储可用', 'success');
                } catch (e) {
                    storageAvailable = false;
                    envWarning.style.display = 'block';
                    addLog('❌ 本地存储不可用！请关闭无痕模式或允许存储', 'error');
                }
            }
            testStorage();

            // ========== 数据管理 ==========
            const STORAGE_KEY = 'wenyan_words_v3';

            function loadData() {
                if (!storageAvailable) {
                    addLog('⚠️ 存储不可用，无法读取词库', 'error');
                    return [];
                }
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return [];
                    const data = JSON.parse(raw);
                    if (!Array.isArray(data)) return [];
                    return data;
                } catch (e) {
                    addLog('❌ 读取词库数据失败: ' + e.message, 'error');
                    return [];
                }
            }

            function saveData(data) {
                if (!storageAvailable) {
                    addLog('⚠️ 存储不可用，数据未保存', 'error');
                    return false;
                }
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    return true;
                } catch (e) {
                    addLog('❌ 保存数据失败: ' + e.message, 'error');
                    showToast('⚠️ 存储空间不足，请清理一些数据');
                    return false;
                }
            }

            function generateId() {
                return 'w_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
            }

            function addWord(word, translation) {
                const data = loadData();
                const item = {
                    id: generateId(),
                    word: word.trim(),
                    translation: translation.trim(),
                    createdAt: new Date().toISOString()
                };
                data.push(item);
                const saved = saveData(data);
                if (saved) {
                    addLog(`✅ 添加词条: ${word} → ${translation}`, 'success');
                } else {
                    addLog(`❌ 添加词条失败: ${word}`, 'error');
                }
                return saved ? item : null;
            }

            function updateWord(id, word, translation) {
                const data = loadData();
                const idx = data.findIndex(i => i.id === id);
                if (idx === -1) {
                    addLog(`❌ 更新失败: 找不到词条 ${id}`, 'error');
                    return false;
                }
                const oldWord = data[idx].word;
                data[idx].word = word.trim();
                data[idx].translation = translation.trim();
                const saved = saveData(data);
                if (saved) {
                    addLog(`✅ 更新词条: ${oldWord} → ${word}`, 'success');
                } else {
                    addLog(`❌ 更新词条失败: ${word}`, 'error');
                }
                return saved;
            }

            function deleteWord(id) {
                const data = loadData();
                const item = data.find(i => i.id === id);
                if (!item) {
                    addLog(`❌ 删除失败: 找不到词条 ${id}`, 'error');
                    return false;
                }
                const filtered = data.filter(i => i.id !== id);
                const saved = saveData(filtered);
                if (saved) {
                    addLog(`🗑 删除词条: ${item.word}`, 'success');
                } else {
                    addLog(`❌ 删除词条失败: ${item.word}`, 'error');
                }
                return saved;
            }

            function clearAllData() {
                const saved = saveData([]);
                if (saved) addLog('🗑 词库已清空', 'success');
                return saved;
            }

            function getRandomWord(excludeId) {
                const data = loadData();
                if (data.length === 0) return null;
                const candidates = excludeId ? data.filter(i => i.id !== excludeId) : data;
                if (candidates.length === 0) return data[0];
                return candidates[Math.floor(Math.random() * candidates.length)];
            }

            // ========== Toast ==========
            function showToast(msg, dur) {
                dur = dur || 2000;
                const container = document.getElementById('toastContainer');
                const t = document.createElement('div');
                t.className = 'toast';
                t.textContent = msg;
                container.appendChild(t);
                setTimeout(() => {
                    if (t.parentNode) t.parentNode.removeChild(t);
                }, dur + 300);
            }

            // ========== 页面切换 ==========
            let currentPage = 'page1';

            function switchTab(page) {
                addLog(`🔄 切换到页面: ${page === 'page1' ? '自习导入' : '随机测试'}`, 'info');
                currentPage = page;
                document.getElementById('page1').classList.toggle('active', page === 'page1');
                document.getElementById('page2').classList.toggle('active', page === 'page2');
                document.getElementById('tabBtn1').classList.toggle('active', page === 'page1');
                document.getElementById('tabBtn2').classList.toggle('active', page === 'page2');
                if (page === 'page1') {
                    renderWordList();
                } else {
                    initTestPage();
                    setTimeout(() => {
                        const inp = document.getElementById('answerInput');
                        if (inp && !inp.disabled) inp.focus();
