<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 初中文言文背诵·分级版</title>
    <style>
        :root {
            --bg: #fdf8f0;
            --card-bg: #fffef9;
            --primary: #8b5e3c;
            --primary-light: #a0724a;
            --accent: #c0392b;
            --success: #4a8c5c;
            --danger: #c0392b;
            --text: #3e2f1c;
            --text-light: #6b5d4a;
            --border: #e0d5c1;
            --shadow: 0 2px 12px rgba(62, 47, 28, 0.08);
            --shadow-lg: 0 6px 24px rgba(62, 47, 28, 0.12);
            --radius: 14px;
            --radius-sm: 8px;
            --transition: 0.25s ease;
            --font-serif: 'STSong', 'Songti SC', 'Noto Serif SC', 'SimSun', serif;
            --font-sans: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --nav-height: 60px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-sans);
            background: linear-gradient(160deg, #fdf6ec 0%, #f9f0e2 40%, #fdf8f0 100%);
            min-height: 100vh;
            color: var(--text);
            padding-top: calc(var(--nav-height) + 20px);
            padding-bottom: 80px;
        }
        .app-container { max-width: 650px; margin:0 auto; padding:0 16px; }

        /* 固定导航 */
        .tab-nav {
            position: fixed; top:0; left:50%; transform:translateX(-50%);
            width: calc(100% - 32px); max-width: 618px; z-index:100;
            display:flex; gap:6px;
            background: rgba(255,254,249,0.94);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border-radius: 0 0 var(--radius) var(--radius);
            padding: 8px 6px 10px;
            box-shadow: 0 4px 16px rgba(62,47,28,0.1);
        }
        .tab-btn {
            flex:1; padding:10px 12px; border:none; border-radius:10px;
            font-size:14px; font-weight:600; cursor:pointer;
            background:transparent; color:var(--text-light);
            transition:var(--transition); white-space:nowrap;
        }
        .tab-btn.active { background:var(--primary); color:#fff; box-shadow:0 3px 10px rgba(139,94,60,0.3); }
        .page { display:none; animation: fadeIn 0.3s ease; }
        .page.active { display:block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

        /* 卡片 */
        .card { background:var(--card-bg); border-radius:var(--radius); padding:18px; margin-bottom:14px; box-shadow:var(--shadow); border:1px solid var(--border); }
        .card-title { font-family:var(--font-serif); font-size:18px; font-weight:700; color:var(--primary); margin-bottom:12px; display:flex; align-items:center; gap:8px; }

        /* 选择器 */
        .selector-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
        .selector-row select {
            flex:1; min-width:130px; padding:10px 12px; border:1.5px solid var(--border);
            border-radius:var(--radius-sm); font-size:14px; background:#fffefb;
            color:var(--text); cursor:pointer;
        }

        /* 词库列表 */
        .word-list { list-style:none; max-height:450px; overflow-y:auto; }
        .word-item {
            display:flex; align-items:center; gap:10px; padding:12px 14px;
            border-bottom:1px solid #f0e8d8; flex-wrap:wrap;
        }
        .word-item:hover { background:#fefaf3; }
        .word-text { font-family:var(--font-serif); font-size:20px; font-weight:700; color:var(--accent); min-width:45px; text-align:center; }
        .word-trans { flex:1; font-size:14px; line-height:1.5; }

        /* 测试区 */
        .test-word-display {
            text-align:center; padding:28px 20px;
            background:linear-gradient(135deg, #fefcf7, #fdf6ec);
            border-radius:var(--radius); border:2px dashed var(--border); margin-bottom:14px;
        }
        .ancient-word { font-family:var(--font-serif); font-size:60px; font-weight:900; color:var(--accent); display:block; }
        .test-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:12px 0; }
        .hint-box { background:#fef9f0; border:1px solid #e8d9b8; border-radius:var(--radius-sm); padding:10px; text-align:center; color:#8b6914; min-height:36px; margin-top:10px; }
        .feedback { text-align:center; padding:10px; border-radius:6px; font-weight:600; margin-top:10px; }
        .feedback.correct { background:rgba(74,140,92,0.1); color:var(--success); }
        .feedback.wrong { background:rgba(192,57,43,0.08); color:var(--danger); }
        .feedback.reveal { background:rgba(220,150,50,0.1); color:#8b5e1a; }
        .stats-bar { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:14px; }
        .stat-badge { background:#fffefb; border-radius:20px; padding:6px 14px; font-size:13px; font-weight:600; box-shadow:var(--shadow); border:1px solid var(--border); }

        /* 按钮通用 */
        .btn {
            display:inline-flex; align-items:center; gap:6px;
            padding:9px 16px; border:none; border-radius:var(--radius-sm);
            font-size:14px; font-weight:600; cursor:pointer;
            transition:var(--transition); user-select:none;
            background:var(--primary); color:#fff; box-shadow:0 3px 10px rgba(139,94,60,0.25);
        }
        .btn:hover { background:var(--primary-light); transform:translateY(-1px); }
        .btn-outline { background:#fff; color:var(--primary); border:1.5px solid var(--primary); box-shadow:none; }
        .btn-outline:hover { background:rgba(139,94,60,0.05); }
        .btn-sm { padding:6px 12px; font-size:12px; }
        .btn:disabled { opacity:0.5; pointer-events:none; }

        /* AI 对话框 */
        .chat-fab {
            position:fixed; bottom:24px; right:24px; z-index:200;
            width:56px; height:56px; border-radius:50%;
            background:var(--primary); color:white; font-size:28px;
            display:flex; align-items:center; justify-content:center;
            box-shadow:0 4px 16px rgba(139,94,60,0.35);
            cursor:pointer; transition:var(--transition);
        }
        .chat-fab:hover { transform:scale(1.06); }
        .chat-window {
            position:fixed; bottom:90px; right:24px; z-index:200;
            width:340px; max-width:90vw; height:420px; max-height:60vh;
            background:var(--card-bg); border-radius:var(--radius);
            box-shadow:0 8px 30px rgba(62,47,28,0.2);
            display:none; flex-direction:column; overflow:hidden;
        }
        .chat-window.active { display:flex; }
        .chat-header {
            background:var(--primary); color:white; padding:12px 16px;
            font-weight:600; display:flex; justify-content:space-between;
            align-items:center;
        }
        .chat-messages {
            flex:1; padding:12px; overflow-y:auto; display:flex;
            flex-direction:column; gap:8px; background:#fdfaf3;
        }
        .chat-msg {
            padding:8px 14px; border-radius:18px; font-size:14px;
            max-width:80%; line-height:1.5;
        }
        .chat-msg.user { align-self:flex-end; background:var(--primary); color:#fff; }
        .chat-msg.bot { align-self:flex-start; background:#f0e5d9; color:var(--text); }
        .chat-input-area { display:flex; gap:6px; padding:10px; border-top:1px solid var(--border); }
        .chat-input-area input { flex:1; padding:8px 12px; border:1px solid var(--border); border-radius:20px; font-size:14px; }
        .chat-input-area button { border-radius:50%; width:38px; height:38px; background:var(--primary); color:#fff; border:none; cursor:pointer; }

        @media (max-width:480px) {
            .selector-row select { min-width:100px; font-size:13px; }
            .ancient-word { font-size:42px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 固定导航 -->
    <nav class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('page1')">📖 分级浏览</button>
        <button class="tab-btn" onclick="switchTab('page2')">✍️ 随机测试</button>
    </nav>

    <!-- 页面1：分级词库 -->
    <div class="page active" id="page1">
        <div class="card">
            <div class="card-title">📂 选择范围</div>
            <div class="selector-row">
                <select id="gradeSelect" onchange="onGradeChange()">
                    <option value="all">全部年级</option>
                    <option value="7a">七年级上册</option>
                    <option value="7b">七年级下册</option>
                    <option value="8a">八年级上册</option>
                    <option value="8b">八年级下册</option>
                    <option value="9a">九年级上册</option>
                    <option value="9b">九年级下册</option>
                </select>
                <select id="lessonSelect" onchange="onLessonChange()">
                    <option value="all">全部课文</option>
                </select>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="btn btn-sm btn-outline" onclick="resetSelectors()">🔄 重置</button>
                <span style="margin-left:auto;font-size:13px;color:var(--text-light);" id="currentScope">当前：全部词条</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                📚 字词列表 <span id="wordCount" style="font-size:14px;color:var(--text-light);"></span>
            </div>
            <div style="position:relative;margin-bottom:10px;">
                <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索字词…" style="padding-left:32px;width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;" oninput="renderWordList()">
            </div>
            <ul class="word-list" id="wordList"></ul>
            <div class="empty-state" id="emptyHint" style="display:none;text-align:center;padding:30px;color:var(--text-light);">
                <span style="font-size:48px;">📭</span>
                <p>当前范围没有字词</p>
            </div>
        </div>
    </div>

    <!-- 页面2：随机测试 -->
    <div class="page" id="page2">
        <div class="card" id="testCard">
            <div class="test-word-display">
                <span style="font-size:14px;color:var(--text-light);">请翻译以下古代汉语字词：</span>
                <span class="ancient-word" id="ancientWord">—</span>
            </div>
            <input type="text" id="answerInput" placeholder="输入你的翻译…" style="width:100%;padding:12px;text-align:center;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;" autocomplete="off">
            <div class="test-actions">
                <button class="btn" onclick="submitAnswer()" id="submitBtn">✅ 提交</button>
                <button class="btn btn-outline" onclick="showHint()" id="hintBtn">💡 提示</button>
                <button class="btn btn-outline btn-sm" onclick="skipQuestion()" id="skipBtn">⏭ 跳过</button>
            </div>
            <div class="hint-box" id="hintDisplay"></div>
            <div id="feedbackArea"></div>
        </div>
        <div class="stats-bar">
            <span class="stat-badge">📝 已测：<b id="statTotal">0</b></span>
            <span class="stat-badge">✅ 正确：<b id="statCorrect">0</b></span>
            <span class="stat-badge">📊 正确率：<b id="statRate">-</b></span>
            <span class="stat-badge">🔄 本题尝试：<b id="statAttempts">0</b>/3</span>
        </div>
        <div class="empty-state" id="emptyTestState" style="display:none;text-align:center;padding:40px;color:var(--text-light);">
            <span style="font-size:48px;">📭</span>
            <p>请先选择年级和课文</p>
        </div>
    </div>
</div>

<!-- AI 对话框（浮动按钮+聊天窗口） -->
<div class="chat-fab" onclick="toggleChat()">💬</div>
<div class="chat-window" id="chatWindow">
    <div class="chat-header">
        <span>🤖 文言文助手</span>
        <button style="background:none;border:none;color:white;font-size:20px;cursor:pointer;" onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="chat-msg bot">你好！我是文言文助手。</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="输入你的问题…" onkeydown="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()">➤</button>
    </div>
</div>

<script>
    // ===================== 内置词库 =====================
    const BUILT_IN_WORDS = {
        "7a": {  // 七年级上册
            "咏雪": [
                {word:"骤",translation:"急，紧"},
                {word:"何所似",translation:"像什么"},
                {word:"差可拟",translation:"差不多可以相比"},
                {word:"未若",translation:"不如，比不上"},
                {word:"因",translation:"趁，乘"}
            ],
            "陈太丘与友期行": [
                {word:"期",translation:"约定"},
                {word:"舍去",translation:"丢下（他）而离开"},
                {word:"乃",translation:"才"},
                {word:"尊君在不",translation:"你的父亲在不在？尊君，对别人父亲的尊称。不，同“否”"},
                {word:"相委而去",translation:"丢下我走了。委，丢弃。去，离开"},
                {word:"家君",translation:"对人谦称自己的父亲"},
                {word:"引",translation:"拉，牵拉"},
                {word:"顾",translation:"回头看"}
            ],
            "论语十二章": [
                {word:"时习",translation:"按时温习"},
                {word:"不亦说乎",translation:"不也是很快乐吗？说，同“悦”，愉快"},
                {word:"愠",translation:"生气，恼怒"},
                {word:"三省",translation:"多次进行自我检查。三，泛指多次"},
                {word:"忠",translation:"竭尽自己的心力"},
                {word:"信",translation:"诚信"},
                {word:"立",translation:"立身，指能有所成就"},
                {word:"惑",translation:"迷惑，疑惑"},
                {word:"逾矩",translation:"越过法度"},
                {word:"罔",translation:"迷惑，意思是感到迷茫而无所适从"},
                {word:"殆",translation:"疑惑"},
                {word:"箪",translation:"古代盛饭用的圆形竹器"},
                {word:"堪",translation:"能忍受"},
                {word:"好之者",translation:"喜欢学问和事业的人"},
                {word:"乐之者",translation:"以之为快乐的人"},
                {word:"饭疏食",translation:"吃粗粮。饭，吃。疏食，粗粮"},
                {word:"肱",translation:"胳膊上从肩到肘的部分"},
                {word:"笃志",translation:"坚定志向"},
                {word:"切问",translation:"恳切地发问"},
                {word:"仁",translation:"仁德"}
            ]
            // 可继续添加《诫子书》《狼》等
        },
        "7b": {  // 七年级下册
            "孙权劝学": [
                {word:"卿",translation:"古代君对臣的爱称"},
                {word:"当涂",translation:"当道，当权"},
                {word:"辞",translation:"推托"},
                {word:"务",translation:"事务"},
                {word:"孤",translation:"古时王侯的自称"},
                {word:"治经",translation:"研究儒家经典"},
                {word:"博士",translation:"古代掌管经学传授的学官"},
                {word:"但",translation:"只，只是"},
                {word:"涉猎",translation:"粗略地阅读"},
                {word:"见往事",translation:"了解历史。见，了解。往事，历史"},
                {word:"及",translation:"到了……的时候"},
                {word:"过",translation:"经过"},
                {word:"才略",translation:"军事或政治方面的才干和谋略"},
                {word:"非复",translation:"不再是"},
                {word:"更",translation:"另，另外"},
                {word:"刮目相待",translation:"拭目相看，用新的眼光看待"},
                {word:"见事",translation:"认清事物"}
            ],
            "木兰诗": [
                {word:"唧唧",translation:"叹息声"},
                {word:"当户织",translation:"对着门织布"},
                {word:"机杼",translation:"织布机"},
                {word:"唯",translation:"只"},
                {word:"何所思",translation:"想什么"},
                {word:"可汗",translation:"我国古代西北地区民族对最高统治者的称呼"},
                {word:"军书十二卷",translation:"征兵的名册很多卷。十二，泛指多数"},
                {word:"愿为市鞍马",translation:"愿意为此去买鞍马。市，买"},
                {word:"戎机",translation:"战事"},
                {word:"朔气",translation:"北方的寒气"},
                {word:"金柝",translation:"古代军中守夜打更用的器具"},
                {word:"策勋",translation:"记功"},
                {word:"强",translation:"有余"},
                {word:"不用",translation:"不愿做"},
                {word:"郭",translation:"外城"},
                {word:"红妆",translation:"女子的艳丽装束"},
                {word:"火伴",translation:"同伍的士兵。火，同“伙”"},
                {word:"扑朔",translation:"动弹"},
                {word:"迷离",translation:"眯着眼"},
                {word:"傍地走",translation:"贴着地面走"}
            ]
        },
        "8a": {  // 八年级上册
            "三峡": [
                {word:"自非",translation:"如果不是"},
                {word:"曦月",translation:"太阳和月亮"},
                {word:"襄",translation:"冲上，漫上"},
                {word:"沿溯阻绝",translation:"上行和下行的航道都被阻断"},
                {word:"奔",translation:"飞奔的马"},
                {word:"不以疾",translation:"没有这么快"},
                {word:"素湍",translation:"激起白色浪花的激流"},
                {word:"回清",translation:"回旋的清波"},
                {word:"绝巘",translation:"极高的山峰"},
                {word:"飞漱",translation:"飞速地往下冲荡"},
                {word:"属引",translation:"接连不断"},
                {word:"凄异",translation:"凄惨悲凉"}
            ],
            "答谢中书书": [
                {word:"五色交辉",translation:"这里形容石壁色彩斑斓"},
                {word:"四时",translation:"四季"},
                {word:"歇",translation:"消散"},
                {word:"颓",translation:"坠落"},
                {word:"沉鳞",translation:"水中潜游的鱼"},
                {word:"欲界",translation:"人间"},
                {word:"仙都",translation:"神仙居住的美好世界"},
                {word:"与",translation:"参与。这里有“欣赏”“领悟”的意思"}
            ]
            // 可补充《记承天寺夜游》《与朱元思书》等
        }
        // 后续可补充8b、9a、9b
    };

    // ===================== 全局状态 =====================
    let currentScopeWords = [];   // 当前范围内的词条（用于列表和测试）
    let testState = {
        currentWord: null,
        attempts: 0,
        hintLevel: 0,
        totalTested: 0,
        totalCorrect: 0,
        isLocked: false
    };

    // ===================== 工具函数 =====================
    function escapeHTML(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
    function showToast(msg) {
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#3e2f1c;color:#fff;padding:10px 22px;border-radius:24px;z-index:999;font-weight:600;';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(()=> t.remove(), 2000);
    }

    // ===================== 下拉框联动 =====================
    function populateLessons(grade) {
        const lessonSelect = document.getElementById('lessonSelect');
        lessonSelect.innerHTML = '<option value="all">全部课文</option>';
        if (grade === 'all') {
            // 合并所有年级的课文名
            const allLessons = new Set();
            for (let g in BUILT_IN_WORDS) {
                Object.keys(BUILT_IN_WORDS[g]).forEach(k => allLessons.add(k));
            }
            allLessons.forEach(name => {
                lessonSelect.innerHTML += `<option value="${name}">${name}</option>`;
            });
            return;
        }
        const gradeData = BUILT_IN_WORDS[grade];
        if (!gradeData) return;
        Object.keys(gradeData).forEach(lessonName => {
            lessonSelect.innerHTML += `<option value="${lessonName}">${lessonName}</option>`;
        });
    }

    function onGradeChange() {
        const grade = document.getElementById('gradeSelect').value;
        populateLessons(grade);
        document.getElementById('lessonSelect').value = 'all';
        updateScopeWords();
    }

    function onLessonChange() {
        updateScopeWords();
    }

    function resetSelectors() {
        document.getElementById('gradeSelect').value = 'all';
        document.getElementById('lessonSelect').value = 'all';
        populateLessons('all');
        updateScopeWords();
        showToast('🔄 已重置为全部词条');
    }

    // 根据当前选择更新 currentScopeWords
    function updateScopeWords() {
        const grade = document.getElementById('gradeSelect').value;
        const lesson = document.getElementById('lessonSelect').value;
        let words = [];

        if (grade === 'all' && lesson === 'all') {
            for (let g in BUILT_IN_WORDS) {
                for (let l in BUILT_IN_WORDS[g]) {
                    words = words.concat(BUILT_IN_WORDS[g][l]);
                }
            }
        } else if (grade === 'all' && lesson !== 'all') {
            // 在所有年级中找该课文名
            for (let g in BUILT_IN_WORDS) {
                if (BUILT_IN_WORDS[g][lesson]) {
                    words = words.concat(BUILT_IN_WORDS[g][lesson]);
                }
            }
        } else if (grade !== 'all' && lesson === 'all') {
            const gradeData = BUILT_IN_WORDS[grade];
            if (gradeData) {
                for (let l in gradeData) words = words.concat(gradeData[l]);
            }
        } else {
            const gradeData = BUILT_IN_WORDS[grade];
            if (gradeData && gradeData[lesson]) words = gradeData[lesson];
        }

        currentScopeWords = words;
        document.getElementById('currentScope').textContent =
            `当前：${grade==='all'?'全部年级':grade.toUpperCase()} ${lesson==='all'?'· 全部课文':lesson} (${words.length}词)`;

        renderWordList();
        // 如果测试页面开着，也刷新测试题（但不清空统计，除非主动重置）
        if (document.getElementById('page2').classList.contains('active')) {
            initTestPage(true); // 重置题目
        }
    }

    // ===================== 渲染词库列表 =====================
    function renderWordList() {
        const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
        const listEl = document.getElementById('wordList');
        const emptyHint = document.getElementById('emptyHint');
        document.getElementById('wordCount').textContent = `(${currentScopeWords.length}词)`;

        let filtered = currentScopeWords;
        if (searchTerm) {
            filtered = currentScopeWords.filter(w =>
                w.word.toLowerCase().includes(searchTerm) || w.translation.toLowerCase().includes(searchTerm)
            );
        }

        if (filtered.length === 0) {
            listEl.innerHTML = '';
            emptyHint.style.display = 'block';
        } else {
            emptyHint.style.display = 'none';
            listEl.innerHTML = filtered.map(w => `
                <li class="word-item">
                    <span class="word-text">${escapeHTML(w.word)}</span>
                    <span class="word-trans">${escapeHTML(w.translation)}</span>
                </li>
            `).join('');
        }
    }

    // ===================== 页面切换 =====================
    function switchTab(page) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        if (page === 'page1') {
            document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
            document.getElementById('page1').classList.add('active');
        } else {
            document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
            document.getElementById('page2').classList.add('active');
            initTestPage();
        }
        window.scrollTo({top:0, behavior:'smooth'});
    }

    // ===================== 测试逻辑 =====================
    function initTestPage(resetQuestion = true) {
        const emptyTest = document.getElementById('emptyTestState');
        const testCard = document.getElementById('testCard');
        if (currentScopeWords.length === 0) {
            emptyTest.style.display = 'block';
            testCard.style.display = 'none';
            return;
        }
        emptyTest.style.display = 'none';
        testCard.style.display = 'block';
        if (resetQuestion || !testState.currentWord || testState.isLocked) {
            pickNewQuestion();
        }
    }

    function pickNewQuestion() {
        if (currentScopeWords.length === 0) return;
        const randomIndex = Math.floor(Math.random() * currentScopeWords.length);
        testState.currentWord = currentScopeWords[randomIndex];
        testState.attempts = 0;
        testState.hintLevel = 0;
        testState.isLocked = false;
        document.getElementById('ancientWord').textContent = testState.currentWord.word;
        document.getElementById('answerInput').value = '';
        document.getElementById('hintDisplay').innerHTML = '';
        document.getElementById('feedbackArea').innerHTML = '';
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('hintBtn').disabled = false;
        document.getElementById('skipBtn').disabled = false;
        document.getElementById('answerInput').disabled = false;
        document.getElementById('statAttempts').textContent = '0/3';
        document.getElementById('answerInput').focus();
    }

    function updateStats() {
        document.getElementById('statTotal').textContent = testState.totalTested;
        document.getElementById('statCorrect').textContent = testState.totalCorrect;
        const rate = testState.totalTested > 0 ? Math.round((testState.totalCorrect/testState.totalTested)*100)+'%' : '-';
        document.getElementById('statRate').textContent = rate;
    }

    function checkAnswer(userAns, correctAns) {
        const clean = s => s.trim().replace(/\s+/g, '').replace(/[，,；;。.：:！!？?]/g, '');
        const u = clean(userAns);
        const c = clean(correctAns);
        if (u === c) return true;
        const parts = c.split(/[；;]/).filter(p=>p);
        if (parts.length>1 && parts.some(p => u.includes(p) || p.includes(u))) return true;
        return u.includes(c) || c.includes(u);
    }

    function submitAnswer() {
        if (!testState.currentWord || testState.isLocked) return;
        const ans = document.getElementById('answerInput').value.trim();
        if (!ans) { showToast('⚠️ 请输入翻译'); return; }
        const correct = testState.currentWord.translation;
        if (checkAnswer(ans, correct)) {
            testState.totalTested++;
            testState.totalCorrect++;
            testState.isLocked = true;
            document.getElementById('feedbackArea').innerHTML =
                `<div class="feedback correct">🎉 正确！答案：${escapeHTML(correct)}</div>`;
            lockUI();
            updateStats();
            showToast('✅ 回答正确！');
            setTimeout(pickNewQuestion, 1800);
        } else {
            testState.attempts++;
            document.getElementById('statAttempts').textContent = testState.attempts+'/3';
            if (testState.attempts >= 3) {
                testState.totalTested++;
                testState.isLocked = true;
                document.getElementById('feedbackArea').innerHTML =
                    `<div class="feedback reveal">😔 3次机会用完，正确答案：${escapeHTML(correct)}</div>`;
                lockUI();
                updateStats();
                showToast('💡 已显示答案');
            } else {
                document.getElementById('feedbackArea').innerHTML =
                    `<div class="feedback wrong">❌ 不对，还剩 <b>${3-testState.attempts}</b> 次机会</div>`;
                document.getElementById('answerInput').value = '';
                document.getElementById('answerInput').focus();
            }
        }
    }

    function lockUI() {
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('hintBtn').disabled = true;
        document.getElementById('skipBtn').disabled = true;
        document.getElementById('answerInput').disabled = true;
    }

    function showHint() {
        if (!testState.currentWord || testState.isLocked) return;
        testState.hintLevel++;
        const cor = testState.currentWord.translation;
        let h = '';
        switch(testState.hintLevel) {
            case 1: h = `💡 提示1：答案约 ${cor.length} 个字`; break;
            case 2: h = `💡 提示2：以「${cor.charAt(0)}」开头`; break;
            case 3: h = `💡 提示3：前半部分「${cor.slice(0, Math.floor(cor.length/2))}...」`; break;
            default: h = `💡 更多：「${cor.slice(0, Math.floor(cor.length*0.7))}...」`;
        }
        document.getElementById('hintDisplay').innerHTML = h;
    }

    function skipQuestion() {
        if (!testState.currentWord || testState.isLocked) return;
        testState.totalTested++;
        testState.isLocked = true;
        document.getElementById('feedbackArea').innerHTML =
            `<div class="feedback reveal">⏭ 已跳过，答案：${escapeHTML(testState.currentWord.translation)}</div>`;
        lockUI();
        updateStats();
        showToast('⏭ 已跳过');
        setTimeout(pickNewQuestion, 1500);
    }

    // ===================== AI 对话框（预留） =====================
    function toggleChat() {
        document.getElementById('chatWindow').classList.toggle('active');
    }

    async function sendChat() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    const messagesDiv = document.getElementById('chatMessages');

    messagesDiv.innerHTML += `<div class="chat-msg user">${escapeHTML(msg)}</div>`;
    input.value = '';
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'chat-msg bot';
    loadingDiv.textContent = '思考中...';
    messagesDiv.appendChild(loadingDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    try {
        // ✅ 这里改成你自己的 Vercel 转发地址
        const response = await fetch('/.netlify/functions/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg })
});

        const data = await response.json();
        loadingDiv.remove();
        const reply = data.reply || data.error || '（无回复）';
        messagesDiv.innerHTML += `<div class="chat-msg bot">${escapeHTML(reply)}</div>`;
    } catch (error) {
        loadingDiv.remove();
        messagesDiv.innerHTML += `<div class="chat-msg bot">❌ 连接失败：${error.message}</div>`;
    }
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

    // ===================== 键盘快捷键 =====================
    document.addEventListener('keydown', function(e) {
        if (document.getElementById('page2').classList.contains('active')) {
            if (e.key === 'Enter' && document.activeElement === document.getElementById('answerInput') && !testState.isLocked) {
                e.preventDefault(); submitAnswer();
            }
            if (e.key === 'Escape' && !testState.isLocked) skipQuestion();
        }
        // 聊天窗口关闭
        if (e.key === 'Escape' && document.getElementById('chatWindow').classList.contains('active')) {
            toggleChat();
        }
    });

    // ===================== 初始化 =====================
    window.onload = function() {
        populateLessons('all');
        updateScopeWords();
        // 默认显示全部词条
    };
</script>
</body>
</html>
